name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: pip install .[build]

      - name: Build executable
        run: python scripts/build_exe.py

      - name: Set artifact name
        id: name
        shell: bash
        run: echo "artifact=gamma-stash-${{ github.ref_name }}-windows.exe" >> $GITHUB_OUTPUT

      - name: Rename artifact
        run: Rename-Item -Path dist/gamma-stash.exe -NewName "${{ steps.name.outputs.artifact }}"

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ steps.name.outputs.artifact }}*
